!
hostname R2
!
no ip domain lookup
ip cef
!
interface Loopback0
 ip address 10.101.255.2 255.255.255.255
 ip ospf 101 area 0
!
interface GigabitEthernet1/0
 description Link_to_Core_R1
 ip address 10.101.0.2 255.255.255.252
 ip ospf 101 area 0
 mpls ip
 no shutdown
!
interface GigabitEthernet2/0
 description Link_to_Core_R3
 ip address 10.101.0.5 255.255.255.252
 ip ospf 101 area 0
 mpls ip
 no shutdown
!
router ospf 101
 router-id 10.101.255.2
!
mpls ip
mpls label protocol ldp
mpls ldp router-id Loopback0 force
!
router bgp 101
 bgp router-id 10.101.255.2
 no bgp default ipv4-unicast
 neighbor 10.101.255.4 remote-as 101
 neighbor 10.101.255.4 update-source Loopback0
 neighbor 10.101.255.1 remote-as 101
 neighbor 10.101.255.1 update-source Loopback0
 neighbor 10.101.255.3 remote-as 101
 neighbor 10.101.255.3 update-source Loopback0
 address-family vpnv4
  neighbor 10.101.255.4 activate
  neighbor 10.101.255.4 send-community both
  neighbor 10.101.255.1 activate
  neighbor 10.101.255.1 send-community both
  neighbor 10.101.255.3 activate
  neighbor 10.101.255.3 send-community both
 exit-address-family
 address-family ipv4
  network 10.101.255.2 mask 255.255.255.255
 exit-address-family
!
end